<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical History - FutureCraft Health</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fc;
}
.page-title{
    color:#0d6efd;
    font-weight:bold;
}
.card{
    border:none;
    border-radius:15px;
}
.card-header{
    font-weight:600;
}
</style>
</head>

<body>

<div class="container-fluid p-4">

<h2 class="page-title mb-4">
<i class="fa-solid fa-notes-medical"></i>
Medical History
</h2>

<div class="row">

<div class="col-md-6 mb-4">
<div class="card shadow">
<div class="card-header bg-primary text-white">
<i class="fa-solid fa-stethoscope"></i>
Previous Diagnoses
</div>
<div class="card-body">
<table class="table table-hover">
<thead>
<tr>
<th>Diagnosis</th>
<th>Date</th>
</tr>
</thead>

<tbody>
<tr>
<td>Typhoid</td>
<td>15-05-2024</td>
</tr>

<tr>
<td>Viral Fever</td>
<td>12-01-2024</td>
</tr>

<tr>
<td>Asthma Attack</td>
<td>08-09-2023</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>

<div class="col-md-6 mb-4">
<div class="card shadow">
<div class="card-header bg-success text-white">
<i class="fa-solid fa-pills"></i>
Current Medications
</div>
<div class="card-body">
<ul class="list-group">
<li class="list-group-item">Paracetamol 650mg</li>
<li class="list-group-item">Metformin 500mg</li>
<li class="list-group-item">Vitamin D Tablets</li>
</ul>
</div>
</div>
</div>

<div class="col-md-6 mb-4">
<div class="card shadow">
<div class="card-header bg-danger text-white">
<i class="fa-solid fa-triangle-exclamation"></i>
Allergies
</div>
<div class="card-body">
<span class="badge bg-danger fs-6">Penicillin</span>
<span class="badge bg-warning text-dark fs-6">Dust Allergy</span>
</div>
</div>
</div>

<div class="col-md-6 mb-4">
<div class="card shadow">
<div class="card-header bg-info text-white">
<i class="fa-solid fa-heart-pulse"></i>
Chronic Conditions
</div>
<div class="card-body">
<ul>
<li>Asthma</li>
<li>Diabetes</li>
<li>Hypertension</li>
</ul>
</div>
</div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
